<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optional Phone Numbers</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Optional Phone Numbers</h1>
        <p>Save numbers and open WhatsApp quickly.</p>
      </header>

      <section class="card">
        <form id="phone-form" novalidate>
          <label for="name">Enter name</label>
          <input
            id="name"
            type="text"
            autocomplete="name"
            placeholder="e.g. Ahmed"
            required
          />

          <label for="country">Select country</label>
          <select id="country" required>
            <option value="" disabled selected>Choose country</option>
            <option value="+971">United Arab Emirates (+971)</option>
            <option value="+1">United States/Canada (+1)</option>
            <option value="+44">United Kingdom (+44)</option>
            <option value="+91">India (+91)</option>
            <option value="+92">Pakistan (+92)</option>
            <option value="+61">Australia (+61)</option>
            <option value="+966">Saudi Arabia (+966)</option>
            <option value="+974">Qatar (+974)</option>
            <option value="+968">Oman (+968)</option>
            <option value="+965">Kuwait (+965)</option>
          </select>

          <label for="phone">Enter number</label>
          <input
            id="phone"
            type="tel"
            inputmode="numeric"
            autocomplete="tel"
            placeholder="e.g. 501234567"
            required
          />

          <button id="save-btn" type="submit">Save Number</button>
          <p id="form-message" class="message" aria-live="polite"></p>
        </form>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>Saved Numbers</h2>
          <div class="list-tools">
            <button id="import-csv-btn" type="button">Import CSV</button>
            <button id="export-csv-btn" type="button">Export CSV</button>
          </div>
        </div>
        <input id="import-csv-input" type="file" accept=".csv,text/csv" hidden />
        <ul id="number-list" class="number-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
